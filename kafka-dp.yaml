apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
spec:
  serviceName: kafka-headless
  replicas: 3
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:4.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
              name: broker
            - containerPort: 9093
              name: controller
            - containerPort: 9094
              name: external
          env:
            # roles
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            # NODE ID từ pod ordinal
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # quorum config
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "0@kafka-0.kafka-headless:9093,1@kafka-1.kafka-headless:9093,2@kafka-2.kafka-headless:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "INTERNAL"
            # listeners
            - name: KAFKA_LISTENERS
              value: "INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9094"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT"
            - name: KAFKA_EXTERNAL_HOST
              value: "main-nlb-67896e75428b29e0.elb.us-east-1.amazonaws.com"
            # storage
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
          command:
            - sh
            - -c
            - |
              export KAFKA_NODE_ID=$(echo $POD_NAME | awk -F'-' '{print $NF}')
              export KAFKA_EXTERNAL_PORT=$((9094 + KAFKA_NODE_ID))
              export KAFKA_ADVERTISED_LISTENERS="INTERNAL://${POD_NAME}.kafka-headless:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST}:${KAFKA_EXTERNAL_PORT}"
              exec /etc/kafka/docker/run
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
spec:
  # Headless service cho nội bộ cluster, dùng cho controller/broker giao tiếp với nhau
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: broker
      protocol: TCP
      port: 9092
      targetPort: 9092
    - name: controller
      protocol: TCP
      port: 9093
      targetPort: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-external-0
spec:
  selector:
    statefulset.kubernetes.io/pod-name: kafka-0
  type: NodePort
  ports:
    - name: external
      protocol: TCP
      port: 9094
      targetPort: 9094
      nodePort: 30094
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-external-1
spec:
  selector:
    statefulset.kubernetes.io/pod-name: kafka-1
  type: NodePort
  ports:
    - name: external
      protocol: TCP
      port: 9094
      targetPort: 9094
      nodePort: 30095
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-external-2
spec:
  selector:
    statefulset.kubernetes.io/pod-name: kafka-2
  type: NodePort
  ports:
    - name: external
      protocol: TCP
      port: 9094
      targetPort: 9094
      nodePort: 30096
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: local
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092"
            - name: DYNAMIC_CONFIG_ENABLED
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
spec:
  type: NodePort
  selector:
    app: kafka-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
